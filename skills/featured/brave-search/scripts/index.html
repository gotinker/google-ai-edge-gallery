<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brave Search</title>
  </head>
  <body>
    <script>
      /**
       * Searches the web using the Brave Search API.
       * @param {string} query - The search query.
       * @param {number} count - Number of results to return (1-10).
       * @param {string} apiKey - Brave Search API key.
       */
      async function braveSearch(query, count, apiKey) {
        const params = new URLSearchParams({
          q: query,
          count: String(Math.min(Math.max(count, 1), 10)),
        });

        const response = await fetch(
          `https://api.search.brave.com/res/v1/web/search?${params.toString()}`,
          {
            headers: {
              Accept: "application/json",
              "Accept-Encoding": "gzip",
              "X-Subscription-Token": apiKey,
            },
          }
        );

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`Brave Search API error ${response.status}: ${errorText}`);
        }

        const data = await response.json();
        const webResults = data?.web?.results || [];

        if (webResults.length === 0) {
          return { result: `No web results found for query: "${query}"` };
        }

        const results = webResults.map((item) => ({
          title: item.title || "No title",
          url: item.url || "",
          description: item.description || "No description available.",
        }));

        return { results };
      }

      window["ai_edge_gallery_get_result"] = async (data, secret) => {
        try {
          const jsonData = JSON.parse(data);

          if (!jsonData.query || jsonData.query.trim() === "") {
            return JSON.stringify({ error: "No search query provided." });
          }
          if (!secret || secret.trim() === "") {
            return JSON.stringify({ error: "Brave Search API key is required." });
          }

          const count = jsonData.count && Number.isInteger(jsonData.count) ? jsonData.count : 5;
          const searchResponse = await braveSearch(jsonData.query.trim(), count, secret.trim());

          return JSON.stringify(searchResponse);
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: `Search failed: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
